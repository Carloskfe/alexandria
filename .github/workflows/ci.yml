name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # ── Lint / Typecheck / Build ─────────────────────────────────────────────────
  lint-typecheck-build:
    name: ${{ matrix.service }} — lint / typecheck / build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, web, worker]

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @noetia/${{ matrix.service }} lint

      - name: Typecheck
        run: pnpm --filter @noetia/${{ matrix.service }} typecheck

      - name: Build
        run: pnpm --filter @noetia/${{ matrix.service }} build

  # ── Unit tests — TypeScript services (api, web, worker, mobile) ─────────────
  unit-tests-ts:
    name: ${{ matrix.service }} — unit tests (≥80% coverage)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, web, worker, mobile]

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm --filter @noetia/${{ matrix.service }} test:cov

  # ── Unit tests — Python (image-gen) ─────────────────────────────────────────
  unit-tests-python:
    name: image-gen — unit tests (≥80% coverage)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get install -y libcairo2-dev pkg-config python3-dev

      - name: Install Python dependencies
        run: pip install -r services/image-gen/requirements.txt

      - name: Run tests with coverage
        working-directory: services/image-gen
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under=80

  # ── E2E tests (Playwright) ───────────────────────────────────────────────────
  e2e:
    name: web — E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [lint-typecheck-build]

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @noetia/web exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @noetia/web test:e2e
        env:
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: services/web/playwright-report/
          retention-days: 7
